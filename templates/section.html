<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} - {{site_name}}</title>
  <link rel="stylesheet" href="{{base_path}}static/css/style.css">
</head>
<body class="doc-page">
  <header class="navbar">
    <div class="navbar-inner">
      <a href="{{base_path}}index.html" class="navbar-brand">{{site_name}}</a>
      <nav class="navbar-nav">
        {{nav_links}}
      </nav>
      <div class="navbar-actions">
        <button id="search-toggle" class="icon-btn" title="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <button id="theme-toggle" class="icon-btn" title="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button id="sidebar-toggle" class="icon-btn" title="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="doc-layout section-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        {{sidebar_nav}}
      </div>
    </aside>

    <main class="section-main">
      {{breadcrumbs}}
      <div class="section-header">
        <h1>{{title}}</h1>
        <p class="section-description">{{description}}</p>
      </div>
      {{section_content}}
      <section class="cards-section">
        <div class="cards-grid">
          {{cards}}
        </div>
      </section>
      <footer class="doc-footer">
        <p>&copy; {{current_year}} {{footer_text}}</p>
      </footer>
    </main>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Search Modal -->
  <div id="search-modal" class="search-modal">
    <div class="search-modal-content">
      <div class="search-input-wrapper">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="搜索文档..." autocomplete="off">
        <button id="search-close" class="search-close">ESC</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@0.263.1"></script>
  <script>lucide.createIcons();</script>
  <script src="{{base_path}}static/js/main.js"></script>
</body>
</html>
